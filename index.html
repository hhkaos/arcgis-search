<html>
<head>
  <title>ArcGIS Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Nunito:600,700" rel="stylesheet">

  <link rel="shortcut icon" href="https://www.arcgis.com/favicon.ico">
  <link rel="search" type="application/opensearchdescription+xml" href="https://www.rauljimenez.info/arcgis-search/opensearch.xml" title="ArcGIS Search">

  <style type="text/css">
  * {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    padding: 0;
  }

  #container {
    width: 95%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .centered {
    text-align: center;
    margin-top: 2rem;
    margin-bottom: 2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  #logo {
    width: 200px;
    height: auto;
  }

  .gsc-wrapper {
    max-width: none !important;
    width: 100% !important;
  }

  .gsc-above-wrapper-area {
    border-bottom: 0 !important;
    margin-bottom: 2rem !important;
    max-width: none !important;
    width: 100% !important;
  }

  form.gsc-search-box {
    margin-bottom: 0 !important;
    width: 100% !important;
    max-width: none !important;
  }

  table.gsc-search-box td.gsc-input {
    padding-right: 0 !important;
    width: 100%;
  }

  .gsc-input {
    background-color: #fff;
    height: 50px;
    vertical-align: top;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: box-shadow 200ms cubic-bezier(0.4, 0.0, 0.2, 1);
    width: 100% !important;
  }

  .gsc-input:hover,
  .gsc-input:focus {
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .gsc-input-box,
  input {
    border: 0 !important;
    box-shadow: none !important;
  }

  .gsc-search-button input,
  .gsc-search-button > button {
    margin-left: 0 !important;
    padding: 0.75rem 1.5rem !important;
    background-color: #5989f3 !important;
    border: none !important;
    height: 50px !important;
    cursor: pointer;
    font-weight: 600 !important;
  }

  .gsc-search-button input:hover,
  .gsc-search-button > button:hover {
    background-color: #4a79e8 !important;
  }

  .gsc-resultsbox-visible {
    width: 100% !important;
    float: none !important;
    max-width: none !important;
  }

  .gsc-adBlock {
    display: none !important;
  }

  /* Forzar que todos los elementos de GCS ocupen ancho completo */
  .gsc-search-box,
  .gsc-resultsbox,
  table[cellpadding] {
    width: 100% !important;
    max-width: none !important;
  }

  /* Sobrescribir cualquier ancho fijo de Google Custom Search */
  .gsc-control,
  .gsc-control-cse,
  .gsc-control-cse .gsc-table-result {
    width: 100% !important;
    max-width: none !important;
  }

  /* Hacer resultados más compactos (estilo Google) */
  .gsc-webResult,
  .gsc-result,
  .gsc-webResult.gsc-result {
    padding: 0.45rem 0 !important;
    margin: 0.15rem 0 !important;
    border-bottom: 1px solid #f1f3f4;
  }

  .gsc-webResult:last-child,
  .gsc-result:last-child {
    border-bottom: none;
  }

  /* Reducir tamaño de imágenes (derecha + proporción correcta) */
  .gsc-image,
  .gs-image {
    width: 72px !important;
    height: 72px !important;
    max-width: 72px !important;
    max-height: 72px !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
    margin: 0 !important;
  }

  .gsc-image img,
  .gs-image img,
  .gs-image > img,
  img.gs-image {
    width: auto !important;
    height: auto !important;
    max-width: 72px !important;
    max-height: 72px !important;
    display: block !important;
    object-fit: contain !important;
  }

  /* Ajustar contenedores reales de imagen en Google CSE */
  .gsc-image-box,
  .gs-image-box,
  .gs-web-image-box,
  .gs-web-image-box-landscape {
    margin: 0 !important;
    padding: 0 !important;
    width: 72px !important;
    min-width: 72px !important;
    max-width: 72px !important;
    height: 72px !important;
  }

  .gsc-table-cell-image,
  .gs-promotion-image-box,
  .gsc-table-cell-thumbnail.gsc-thumbnail {
    width: 72px !important;
    min-width: 72px !important;
    max-width: 72px !important;
    padding-left: 0.65rem !important;
    padding-right: 0 !important;
    text-align: right !important;
    float: right !important;
  }

  /* No tocar el contenedor de titulo (Google lo reutiliza con esta clase) */
  .gsc-table-cell-thumbnail.gsc-thumbnail-left {
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    padding: 0 !important;
    float: none !important;
    text-align: left !important;
  }

  /* Reducir padding en resultado */
  .gs-json-result.gs-web-result {
    margin-bottom: 0.2rem !important;
    padding-bottom: 0.2rem !important;
  }

  /* Compactar títulos y descripciones */
  .gsc-result-info {
    margin-bottom: 0.2rem !important;
    font-size: 0.95rem !important;
    line-height: 1.35 !important;
  }

  .gsc-result-title,
  .gsc-result-title > *,
  .gs-title a,
  a.gs-title {
    margin: 0 !important;
    padding: 0 0 0.08rem 0 !important;
    font-size: 1.05rem !important;
    line-height: 1.28 !important;
    font-weight: 400 !important;
  }

  .gs-title {
    width: auto !important;
    overflow: visible !important;
  }

  .gsc-result-snippet,
  .gs-snippet {
    margin: 0 !important;
    padding: 0.08rem 0 !important;
    font-size: 0.92rem !important;
    line-height: 1.42 !important;
    color: #3c4043 !important;
  }

  .gs-visibleUrl,
  .gsc-url-top,
  .gsc-url-top * {
    font-size: 0.9rem !important;
    line-height: 1.25 !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .gsc-table-result,
  .gsc-url-top {
    padding: 0 !important;
    margin: 0 !important;
  }

  .gsc-thumbnail-inside {
    padding: 0 !important;
    margin: 0 0 0.12rem 0 !important;
    overflow: visible !important;
  }

  .gsc-cursor-box {
    margin-top: 2rem !important;
  }

  .gsc-cursor-page {
    border: 1px solid #ddd;
    padding: 0.75rem 1rem;
    background-color: #fff;
    cursor: pointer;
    border-radius: 4px;
    margin: 0.5rem 0.25rem;
  }

  .gsc-cursor-page:hover {
    background-color: #f2f2f2;
  }

  #footerTxt {
    text-align: center;
    font-size: 0.9rem;
    font-family: system-ui;
    margin-top: 2rem;
    padding-bottom: 2rem;
  }

  #footerTxt a {
    color: #2863e6;
    text-decoration: none;
    margin: 0 0.5rem;
  }

  #footerTxt a:hover {
    text-decoration: underline;
  }

  .typeform-share.button {
    border-radius: 4px !important;
    position: fixed !important;
    right: 1rem !important;
    bottom: 1rem !important;
    font-size: 12px !important;
    font-family: system-ui !important;
    background-color: #fff !important;
    text-decoration: none !important;
    color: #2863e6 !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    border: 2px solid #2863e6 !important;
    padding: 0.75rem 1.25rem !important;
  }

  .typeform-share.button:hover {
    background-color: #f0f4ff !important;
  }

  /* Tablet: 768px and below */
  @media only screen and (max-width: 768px) {
    #container {
      width: 98%;
    }

    .centered {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
    }

    #logo {
      width: 150px;
    }

    .gsc-input {
      height: 45px;
    }
  }

  /* Mobile: 480px and below */
  @media only screen and (max-width: 480px) {
    #container {
      width: 100%;
      padding: 0 0.5rem;
    }

    .centered {
      flex-direction: column;
      margin-top: 1rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      gap: 0.5rem;
    }

    #logo {
      width: 100px;
    }

    .gsc-input {
      height: 40px;
      font-size: 16px;
    }

    .gsc-search-button input,
    .gsc-search-button > button {
      padding: 0.5rem 1rem !important;
      font-size: 14px !important;
      height: 40px !important;
    }

    #footerTxt {
      font-size: 0.8rem;
    }

    #footerTxt a {
      display: inline;
      margin: 0 0.25rem;
    }

    .typeform-share.button {
      right: 0.5rem !important;
      bottom: 0.5rem !important;
      font-size: 10px !important;
      padding: 0.5rem 0.75rem !important;
    }
  }
  </style>
</head>
<body>
  <!-- Nota: esta es la version actualizada. La version anterior se conserva en index_old.html -->

      <a href="https://esri-es.github.io/awesome-arcgis/" target="_blank">

  </div>
