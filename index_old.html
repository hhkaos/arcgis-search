<html>
<head>
  <title>ArcGIS Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Nunito:600,700" rel="stylesheet">

  <link rel="shortcut icon" href="https://www.arcgis.com/favicon.ico">
  <link rel="search" type="application/opensearchdescription+xml" href="https://www.rauljimenez.info/arcgis-search/opensearch.xml" title="ArcGIS Search">

  <style type="text/css">
  * {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    padding: 0;
  }

  #container {
    width: 95%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .centered {
    text-align: center;
    margin-top: 2rem;
    margin-bottom: 2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  #logo {
    width: 200px;
    height: auto;
  }

  .gsc-above-wrapper-area {
    border-bottom: 0 !important;
    margin-bottom: 2rem !important;
  }

  form.gsc-search-box {
    margin-bottom: 0 !important;
    width: 100% !important;
  }

  table.gsc-search-box td.gsc-input {
    padding-right: 0 !important;
    width: 100%;
  }

  .gsc-input {
    background-color: #fff;
    height: 50px;
    vertical-align: top;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: box-shadow 200ms cubic-bezier(0.4, 0.0, 0.2, 1);
    width: 100% !important;
  }

  .gsc-input:hover,
  .gsc-input:focus {
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .gsc-input-box,
  input {
    border: 0 !important;
    box-shadow: none !important;
  }

  .gsc-search-button input,
  .gsc-search-button > button {
    margin-left: 0 !important;
    padding: 0.75rem 1.5rem !important;
    background-color: #5989f3 !important;
    border: none !important;
    height: 50px !important;
    cursor: pointer;
    font-weight: 600 !important;
  }

  .gsc-search-button input:hover,
  .gsc-search-button > button:hover {
    background-color: #4a79e8 !important;
  }

  .gsc-resultsbox-visible {
    width: 100% !important;
    float: none !important;
  }

  .gsc-adBlock {
    display: none !important;
  }

  .gsc-cursor-box {
    margin-top: 2rem !important;
  }

  .gsc-cursor-page {
    border: 1px solid #ddd;
    padding: 0.75rem 1rem;
    background-color: #fff;
    cursor: pointer;
    border-radius: 4px;
    margin: 0.5rem 0.25rem;
  }

  .gsc-cursor-page:hover {
    background-color: #f2f2f2;
  }

  /* Footer */
  #footerTxt {
    text-align: center;
    font-size: 0.9rem;
    font-family: system-ui;
    margin-top: auto;
    padding: 2rem 0;
    border-top: 1px solid #ddd;
    background-color: #fff;
    margin-left: -1rem;
    margin-right: -1rem;
    padding-left: 1rem;
    padding-right: 1rem;
  }

  #footerTxt a {
    color: #2863e6;
    text-decoration: none;
    margin: 0 0.5rem;
  }

  #footerTxt a:hover {
    text-decoration: underline;
  }

  .typeform-share.button {
    border-radius: 4px !important;
    position: fixed !important;
    right: 1rem !important;
    bottom: 1rem !important;
    font-size: 12px !important;
    font-family: system-ui !important;
    background-color: #fff !important;
    text-decoration: none !important;
    color: #2863e6 !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    border: 2px solid #2863e6 !important;
    padding: 0.75rem 1.25rem !important;
  }

  .typeform-share.button:hover {
    background-color: #f0f4ff !important;
  }

  /* Tablet: 768px and below */
  @media only screen and (max-width: 768px) {
    #results-container {
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .gsc-adBlock {
      grid-column: 1;
      grid-row: auto;
    }

    .centered {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
    }

    #logo {
      width: 150px;
    }

    #container {
      padding: 0 0.75rem;
    }
  }

  /* Mobile: 480px and below */
  @media only screen and (max-width: 480px) {
    #container {
      padding: 0 0.5rem;
    }

    .centered {
      flex-direction: column;
      margin-top: 1rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      gap: 0.75rem;
    }

    #logo {
      width: 120px;
    }

    .gsc-input {
      height: 44px;
    }

    #footerTxt {
      font-size: 0.8rem;
      padding: 1.5rem 0;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }

    #footerTxt a {
      display: block;
      margin: 0.4rem 0;
    }

    .typeform-share.button {
      right: 0.5rem !important;
      bottom: 0.5rem !important;
      font-size: 10px !important;
      padding: 0.5rem 0.75rem !important;
    }
  }
  </style>
</head>
<body>
